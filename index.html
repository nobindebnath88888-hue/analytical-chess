<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Arena - 10 Min Blitz</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="promotion-modal" class="modal">
        <div class="modal-content">
            <h3>Choose Promotion</h3>
            <div class="promotion-options">
                <button onclick="selectPromotion('q')">♛ Queen</button>
                <button onclick="selectPromotion('r')">♜ Rook</button>
                <button onclick="selectPromotion('b')">♝ Bishop</button>
                <button onclick="selectPromotion('n')">♞ Knight</button>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2 id="winner-text">Game Over</h2>
            <p id="reason-text"></p>
            <div class="modal-actions">
                <button onclick="location.reload()" style="background: #28a745;">🔄 New Match</button>
                <button onclick="closeModal()" style="background: #6c757d;">Close</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
            <h1>Strategy Hub</h1>
            <span id="spectator-badge" style="display:none; background: #ff4757; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold;">👁️ <span id="spectator-count">0</span> watching</span>
        </div>
        
        <div id="timer-area" class="timer-container" style="visibility: hidden;">
            <div id="white-timer" class="timer">White: 10:00</div>
            <div id="black-timer" class="timer">Black: 10:00</div>
        </div>

        <div class="controls">
            <button id="theme-toggle" onclick="toggleTheme()">🌙 Theme</button>
            <button id="sound-toggle" onclick="toggleSound()">🔊 Sound: ON</button>
            <button id="test-sound" onclick="unlockAudio(); playSound('snd-move');" style="background:#e9ecef;">🎵 Test Audio</button>
            <button id="full-screen" onclick="toggleFullScreen()">📺 Fullscreen</button>
            <button id="highlight-toggle" onclick="toggleHighlight()">🎯 King Highlight</button>
            <button id="flip-toggle" onclick="flipBoard()">🔄 Flip</button>
            <button id="draw-btn" onclick="offerDraw()" disabled>🤝 Draw</button>
            <button id="resign-btn" onclick="resignGame()" disabled>🏳️ Resign</button>
        </div>

        <div id="setup-section">
            <button id="match-btn" onclick="startMatchmaking()" style="padding: 15px 40px; font-size: 20px; background: #2b4a7d; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight:bold;">Find Opponent</button>
            <p id="match-status" style="margin-top:15px; font-weight: bold; min-height: 24px; color: #2b4a7d;"></p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
            <h3>Live Matches</h3>
            <div id="live-games-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>

        <div class="game-layout">
            <div class="board-container">
                <div id="black-captured" class="captured-area"></div>
                <div id="board" style="width: 400px; margin: 10px auto;"></div>
                <div id="white-captured" class="captured-area"></div>
                <div class="nav-controls">
                    <button onclick="prevMove()"> < </button>
                    <button onclick="nextMove()"> > </button>
                </div>
            </div>
            
            <div class="sidebar-container">
                <div class="history-section">
                    <h3>Move History</h3>
                    <div id="move-list"></div>
                </div>
                <div class="chat-section">
                    <h3>Game Chat</h3>
                    <div id="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Type a message...">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="snd-move" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="snd-capture" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3" preload="auto"></audio>
    <audio id="snd-check" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="snd-game-start" src="https://assets.mixkit.co/active_storage/sfx/1084/1084-preview.mp3" preload="auto"></audio>
    <audio id="snd-game-end" src="https://assets.mixkit.co/active_storage/sfx/1085/1085-preview.mp3" preload="auto"></audio>
    <audio id="snd-msg" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
