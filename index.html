
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Arena - Glass Edition</title>
    <!-- Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root {
            --bg: #0d1117; 
            --text: #e6edf3; 
            --box: #161b22; 
            --accent: #388bfd; 
            --border: #30363d;
            --modal-bg: rgba(0,0,0,0.85); 
            --check-color: #f85149; 
            --light-square: #606f84; 
            --dark-square: #2e3541; 
            --last-move: rgba(56, 139, 253, 0.4);
        }

        body.dark-mode {
            --bg: #010409;
            --box: #0d1117;
            --light-square: #485464;
            --dark-square: #1c2128;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            transition: 0.3s; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }

        .container { max-width: 950px; margin: auto; text-align: center; }

        .timer-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .timer { font-size: 24px; font-weight: bold; padding: 10px 20px; border-radius: 8px; background: var(--box); border: 2px solid var(--border); min-width: 130px; }
        .timer.active { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); color: var(--accent); }

        .controls { margin-bottom: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #theme-toggle, #sound-toggle, #full-screen, #highlight-toggle, #flip-toggle, #resign-btn, #draw-btn { 
            padding: 8px 12px; cursor: pointer; border-radius: 5px; border: 1px solid var(--border); background: var(--box); color: var(--text); font-size: 13px;
        }

        /* Board Styling - Glass Theme */
        #board { 
            border: 5px solid #21262d; 
            border-radius: 4px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin: 0 auto;
        }
        
        /* Piece visual enhancement */
        .piece-417db {
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
        }

        .white-1e1d7 { background-color: var(--light-square) !important; color: #ced4da !important; }
        .black-3c85d { background-color: var(--dark-square) !important; color: #495057 !important; }

        .highlight-last-move { box-shadow: inset 0 0 3px 3px var(--last-move); }
        .highlight-check { box-shadow: inset 0 0 3px 3px var(--check-color); animation: pulse 1.5s infinite; }
        .highlight-selected { background-color: rgba(255, 255, 0, 0.3) !important; }

        @keyframes pulse { 0%, 100% { box-shadow: inset 0 0 3px 3px var(--check-color); } 50% { box-shadow: inset 0 0 10px 10px var(--check-color); } }

        .dot { height: 14px; width: 14px; background-color: rgba(255, 255, 255, 0.2); border-radius: 50%; display: inline-block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }

        .game-layout { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .sidebar-container { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .history-section, .chat-section { background: var(--box); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; height: 320px; color: var(--text); }
        #move-list, #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; text-align: left; font-size: 14px; }
        .chat-input-area { display: flex; border-top: 1px solid var(--border); }
        #chatInput { flex-grow: 1; border: none; padding: 10px; background: transparent; color: var(--text); outline: none; }
        .chat-input-area button { background: var(--accent); color: white; border: none; padding: 0 15px; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: var(--modal-bg); }
        .modal-content { background-color: var(--box); margin: 15% auto; padding: 30px; border: 2px solid var(--accent); width: 320px; border-radius: 15px; text-align: center; color: var(--text); }
        .chat-msg { margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        
        .nav-controls button { background: var(--box); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 0 5px; }
        .nav-controls button:hover { background: var(--border); }
    </style>
</head>
<body>
    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2 id="winner-text">Game Over</h2>
            <p id="reason-text"></p>
            <div class="modal-actions">
                <button onclick="location.reload()" style="background: #238636; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">🔄 New Match</button>
                <button onclick="closeModal()" style="background: #30363d; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-left: 10px;">Close</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1 style="color: var(--accent);">Strategy Hub</h1>
        
        <div id="timer-area" class="timer-container" style="visibility: hidden;">
            <div id="white-timer" class="timer">White: 10:00</div>
            <div id="black-timer" class="timer">Black: 10:00</div>
        </div>

        <div class="controls">
            <button id="theme-toggle" onclick="toggleTheme()">🌙 Theme</button>
            <button id="sound-toggle" onclick="toggleSound()">🔊 Sound: ON</button>
            <button id="full-screen" onclick="toggleFullScreen()">📺 Fullscreen</button>
            <button id="highlight-toggle" onclick="toggleHighlight()">🎯 King Highlight</button>
            <button id="flip-toggle" onclick="flipBoard()">🔄 Flip</button>
            <button id="draw-btn" onclick="offerDraw()" disabled>🤝 Draw</button>
            <button id="resign-btn" onclick="resignGame()" disabled>🏳️ Resign</button>
        </div>

        <div id="draw-offer-area" style="display:none; background: #1f1b05; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #d29922; color: #e3b341;">
            <span>Opponent offers a draw.</span>
            <button onclick="handleDraw(true)" style="background: #238636; color: white; border: none; padding: 6px 12px; cursor:pointer; margin-left: 10px; border-radius: 4px;">Accept</button>
            <button onclick="handleDraw(false)" style="background: #da3633; color: white; border: none; padding: 6px 12px; cursor:pointer; margin-left: 5px; border-radius: 4px;">Decline</button>
        </div>

        <div id="setup-section">
            <button id="match-btn" onclick="startMatchmaking()" style="padding: 18px 45px; font-size: 20px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 14px 0 rgba(56,139,253,0.39);">Play New Game</button>
            <p id="match-status" style="margin-top:15px; font-weight: bold; min-height: 24px; color: #8b949e;"></p>
        </div>

        <div class="game-layout">
            <div class="board-container">
                <div id="board" style="width: 450px; max-width: 90vw;"></div>
                <div class="nav-controls" style="margin-top: 15px;">
                    <button onclick="prevMove()"> ← Prev </button>
                    <button onclick="nextMove()"> Next → </button>
                </div>
            </div>
            
            <div class="sidebar-container">
                <div class="history-section">
                    <h3 style="margin: 10px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px;">Move History</h3>
                    <div id="move-list"></div>
                </div>

                <div class="chat-section">
                    <h3 style="margin: 10px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px;">Game Chat</h3>
                    <div id="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Type a message...">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Assets -->
    <audio id="snd-move" src="https://images.chesscomfiles.com/chess-themes/pieces/board/sounds/standard/move-self.mp3"></audio>
    <audio id="snd-capture" src="https://images.chesscomfiles.com/chess-themes/pieces/board/sounds/standard/capture.mp3"></audio>
    <audio id="snd-check" src="https://images.chesscomfiles.com/chess-themes/pieces/board/sounds/standard/move-check.mp3"></audio>
    <audio id="snd-game-start" src="https://images.chesscomfiles.com/chess-themes/pieces/board/sounds/standard/game-start.mp3"></audio>
    <audio id="snd-game-end" src="https://images.chesscomfiles.com/chess-themes/pieces/board/sounds/standard/game-end.mp3"></audio>
    <audio id="snd-msg" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <!-- JS Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi8cZYVN6gpZRRSMx2qVHKBRRVQZmdWw4",
            authDomain: "analyticalchess.firebaseapp.com",
            databaseURL: "https://analyticalchess-default-rtdb.firebaseio.com",
            projectId: "analyticalchess",
            storageBucket: "analyticalchess.firebasestorage.app",
            messagingSenderId: "1068006653983",
            appId: "1:1068006653983:web:15ef22659ab22a3fda552a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        var board = null;
        var game = new Chess();
        var myColor = null;
        var roomID = null;
        var soundEnabled = true;
        var highlightEnabled = true;
        var currentMoveIndex = -1;
        var gameHistory = [];
        var isGameOver = false;
        var timers = { w: 600, b: 600 };
        var timerInterval = null;
        var selectedSquare = null;

        function playSound(id) {
            if (!soundEnabled) return;
            const sound = document.getElementById(id);
            if (sound) { sound.currentTime = 0; sound.play().catch(e => {}); }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-toggle').innerText = soundEnabled ? "🔊 Sound: ON" : "🔇 Sound: OFF";
        }

        function startMatchmaking() {
            const statusMsg = document.getElementById('match-status');
            const matchBtn = document.getElementById('match-btn');
            matchBtn.disabled = true;
            statusMsg.innerText = "Searching for an opponent...";

            const waitingRef = database.ref('waitingRoom');
            waitingRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    roomID = data.roomID;
                    waitingRef.remove();
                    const coinFlip = Math.random() < 0.5;
                    myColor = coinFlip ? 'w' : 'b';
                    database.ref('rooms/' + roomID + '/matchReady').set({ start: true, whitePlayerColor: myColor === 'w' ? 'joiner' : 'waiter' });
                    initGame(myColor);
                } else {
                    roomID = "room_" + Math.floor(Math.random() * 1000000);
                    waitingRef.set({ roomID: roomID });
                    database.ref('rooms/' + roomID + '/matchReady').on('value', (s) => {
                        const r = s.val();
                        if (r && r.start) { myColor = r.whitePlayerColor === 'waiter' ? 'w' : 'b'; initGame(myColor); }
                    });
                }
            });
        }

        function initGame(color) {
            playSound('snd-game-start');
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('timer-area').style.visibility = 'visible';
            document.getElementById('draw-btn').disabled = false;
            document.getElementById('resign-btn').disabled = false;
            if (color === 'b') board.orientation('black');
            gameHistory.push(game.fen());
            currentMoveIndex = 0;
            listenToGameUpdates();
        }

        function removeGreyDots() { 
            $('#board .square-55d63').removeClass('highlight-selected');
            $('#board .square-55d63 .dot').remove(); 
        }

        function greyDot(square) {
            var $square = $('#board .square-' + square);
            $square.append('<span class="dot"></span>');
        }

        function onSquareClick(square) {
            if (isGameOver || !myColor || game.turn() !== myColor) return;
            if (currentMoveIndex !== gameHistory.length - 1) return;

            if (selectedSquare) {
                var move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move === null) {
                    var piece = game.get(square);
                    if (piece && piece.color === myColor) {
                        selectedSquare = square;
                        showLegalMoves(square);
                    } else {
                        selectedSquare = null;
                        removeGreyDots();
                    }
                } else {
                    selectedSquare = null;
                    removeGreyDots();
                    afterMoveActions(move);
                }
            } else {
                var piece = game.get(square);
                if (piece && piece.color === myColor) {
                    selectedSquare = square;
                    showLegalMoves(square);
                }
            }
        }

        function showLegalMoves(square) {
            removeGreyDots();
            $('#board .square-' + square).addClass('highlight-selected');
            var moves = game.moves({ square: square, verbose: true });
            for (var i = 0; i < moves.length; i++) { greyDot(moves[i].to); }
        }

        function afterMoveActions(move) {
            if (move.captured) playSound('snd-capture');
            else if (game.in_check()) playSound('snd-check');
            else playSound('snd-move');
            
            database.ref('rooms/' + roomID + '/game').set({ fen: game.fen(), pgn: game.pgn(), timers: timers });
            updateGameState();
        }

        function pieceTheme(piece) {
            return 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/' + piece + '.png';
        }

        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: (s, p) => {
                if (isGameOver || !myColor || game.turn() !== myColor) return false;
                if (currentMoveIndex !== gameHistory.length - 1) return false;
                if (p.search(new RegExp('^' + (myColor === 'w' ? 'b' : 'w'))) !== -1) return false;
            },
            onDrop: (s, t) => {
                var move = game.move({ from: s, to: t, promotion: 'q' });
                if (move === null) return 'snapback';
                selectedSquare = null; removeGreyDots(); afterMoveActions(move);
            },
            onSnapEnd: () => { board.position(game.fen()); }
        };
        board = Chessboard('board', config);

        $('#board').on('click', '.square-55d63', function() {
            onSquareClick($(this).attr('data-square'));
        });

        function listenToGameUpdates() {
            database.ref('rooms/' + roomID + '/game').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.fen) {
                    const isNewMove = data.fen !== game.fen();
                    if (isNewMove) {
                        game.load(data.fen);
                        if (data.timers) timers = data.timers;
                        gameHistory.push(data.fen);
                        currentMoveIndex = gameHistory.length - 1;
                        board.position(data.fen);
                        
                        const h = game.history({verbose: true});
                        const last = h[h.length - 1];
                        if (game.in_check()) playSound('snd-check');
                        else if (last && last.captured) playSound('snd-capture');
                        else playSound('snd-move');
                        
                        updateGameState(); 
                        updateTimerDisplay(); 
                        updateMoveList(data.pgn || "");
                    }
                }
            });

            database.ref('rooms/' + roomID + '/status').on('value', (snapshot) => {
                const d = snapshot.val();
                if (!d) return;
                if (d.type === 'resign') showGameOver('resign', d.by);
                if (d.type === 'timeout') showGameOver('timeout', d.by);
                if (d.type === 'drawOffer' && d.by !== myColor) document.getElementById('draw-offer-area').style.display = 'block';
                if (d.type === 'drawAccepted') showGameOver('draw');
            });

            database.ref('rooms/' + roomID + '/chat').on('child_added', (snapshot) => {
                const msg = snapshot.val();
                displayMessage(msg.user, msg.text);
                if (msg.user !== (myColor === 'w' ? "White" : "Black")) playSound('snd-msg');
            });
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isGameOver) return;
                timers[game.turn()]--;
                updateTimerDisplay();
                if (timers[game.turn()] <= 0) {
                    clearInterval(timerInterval);
                    if (game.turn() === myColor) {
                        database.ref('rooms/' + roomID + '/status').set({ type: 'timeout', by: game.turn() });
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('white-timer').innerText = `White: ${formatTime(timers.w)}`;
            document.getElementById('black-timer').innerText = `Black: ${formatTime(timers.b)}`;
            document.getElementById('white-timer').classList.toggle('active', game.turn() === 'w');
            document.getElementById('black-timer').classList.toggle('active', game.turn() === 'b');
        }

        function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`; }

        function showGameOver(type, detail) {
            if (isGameOver) return;
            isGameOver = true; clearInterval(timerInterval); playSound('snd-game-end');
            let winner = "Draw", reason = "Game Over";
            if (type === 'resign') { winner = (detail === 'w' ? "Black" : "White") + " Wins!"; reason = "Resignation"; }
            else if (type === 'timeout') { winner = (detail === 'w' ? "Black" : "White") + " Wins!"; reason = "Time out"; }
            else { winner = game.in_checkmate() ? (game.turn() === 'w' ? "Black" : "White") + " Wins!" : "Draw"; reason = game.in_checkmate() ? "Checkmate" : "Draw"; }
            document.getElementById('winner-text').innerText = winner;
            document.getElementById('reason-text').innerText = reason;
            document.getElementById('game-over-modal').style.display = 'block';
        }

        function updateGameState() {
            $('.square-55d63').removeClass('highlight-check highlight-last-move');
            const h = game.history({ verbose: true });
            if (h.length > 0) {
                const l = h[h.length - 1];
                $(`.square-${l.from}, .square-${l.to}`).addClass('highlight-last-move');
            }
            if (highlightEnabled && game.in_check()) {
                const k = findKing(game.turn());
                if (k) $(`.square-${k}`).addClass('highlight-check');
            }
            if (game.game_over()) showGameOver();
            else if (roomID) startTimer();
        }

        function findKing(c) {
            const boardState = game.board();
            for (let r = 0; r < 8; r++) {
                for (let c2 = 0; c2 < 8; c2++) {
                    const piece = boardState[r][c2];
                    if (piece && piece.type === 'k' && piece.color === c) {
                        return String.fromCharCode(97 + c2) + (8 - r);
                    }
                }
            }
            return null;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!input.value.trim() || !roomID) return;
            database.ref('rooms/' + roomID + '/chat').push({ user: myColor === 'w' ? "White" : "Black", text: input.value });
            input.value = '';
        }
        function displayMessage(user, text) {
            const chatBox = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<b>${user}:</b> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function updateMoveList(pgn) {
            const list = document.getElementById('move-list');
            list.innerHTML = '';
            const moves = pgn.split(/\d+\./).filter(Boolean);
            moves.forEach((m, i) => {
                const d = document.createElement('div');
                d.style.padding = '4px 0';
                d.style.borderBottom = '1px solid #30363d';
                d.innerText = `${i + 1}. ${m.trim()}`;
                list.appendChild(d);
            });
            list.scrollTop = list.scrollHeight;
        }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function flipBoard() { board.flip(); }
        function closeModal() { document.getElementById('game-over-modal').style.display = 'none'; }
        function toggleHighlight() { highlightEnabled = !highlightEnabled; updateGameState(); }
        function prevMove() { if (currentMoveIndex > 0) { currentMoveIndex--; board.position(gameHistory[currentMoveIndex]); } }
        function nextMove() { if (currentMoveIndex < gameHistory.length - 1) { currentMoveIndex++; board.position(gameHistory[currentMoveIndex]); } }
        function resignGame() { if (confirm("Resign?")) database.ref('rooms/' + roomID + '/status').set({ type: 'resign', by: myColor }); }
        function offerDraw() { database.ref('rooms/' + roomID + '/status').set({ type: 'drawOffer', by: myColor }); }
        function handleDraw(acc) {
            document.getElementById('draw-offer-area').style.display = 'none';
            if (acc) database.ref('rooms/' + roomID + '/status').set({ type: 'drawAccepted' });
        }
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        window.onresize = function() { board.resize(); };
    </script>
</body>
</html>
